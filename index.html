<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>ToDo List</title>
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <input type="text" class="input-text">
        <button class="input-task-btn">click</button>
        <ul class="list">
            <!-- when add task show here -->
        </ul>
        <!-- delete and compelete all task -->
        <div class="control-task">
            <button class="delete-all-task-btn">Delete</button>
            <button class="complete-all-task-btn">Complete</button>
        </div>
    </div>
</body>
</html>
